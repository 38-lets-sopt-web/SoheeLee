<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>소희의 가계부</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- 헤더-->
    <header id="header">
      <div id="header-left">♣️</div>
      <h1 id="header-center">소희의 가계부</h1>
      <div id="header-right">SOPT 38th WEB</div>
      <script type="module" src="js/data.js"></script>
      <script type="module" src="js/main.js"></script>
    </header>

    <main id="main">
      <!-- 검색 필터-->
      <section id="filter-section">
        <h2>검색 필터</h2>

        <div class="filter-grid filter-grid-1">
          <div class="filter-item">
            <label for="filter-title">제목</label>
            <input
              type="text"
              id="filter-title"
              placeholder="내역을 입력하세요"
            />
          </div>
        </div>

        <div class="filter-grid filter-grid-3">
          <div class="filter-item">
            <label for="filter-type">유형</label>
            <select id="filter-type">
              <option value="">전체</option>
              <option value="income">수입</option>
              <option value="expense">지출</option>
            </select>
          </div>
          <div class="filter-item">
            <label for="filter-category">카테고리</label>
            <select id="filter-category">
              <option value="">전체</option>
              <option value="월급">월급</option>
              <option value="식비">식비</option>
              <option value="생활">생활</option>
              <option value="문화">문화</option>
              <option value="교통">교통</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="filter-item">
            <label for="filter-payment">결제수단</label>
            <select id="filter-payment">
              <option value="">전체</option>
              <option value="현금">현금</option>
              <option value="신용카드">신용카드</option>
              <option value="체크카드">체크카드</option>
              <option value="기타">기타</option>
            </select>
          </div>
        </div>

        <div class="filter-grid filter-grid-2">
          <button type="button" id="btn-filter-apply">적용</button>
          <button type="button" id="btn-filter-reset">초기화</button>
        </div>
      </section>

      <!-- 테이블 섹션 -->
      <section id="table-section">
        <div id="table-toolbar">
          <select id="sort-select">
            <option value="date-desc">날짜 내림차순</option>
            <option value="date-asc">날짜 오름차순</option>
          </select>
          <div class="toolbar-btns">
            <button type="button" id="btn-delete">선택 삭제</button>
            <button type="button" id="btn-add">추가</button>
          </div>
        </div>

        <table id="expense-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="check-all" /></th>
              <th>제목</th>
              <th>금액</th>
              <th>날짜</th>
              <th>카테고리</th>
              <th>결제수단</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- JS 렌더링 -->
          </tbody>
          <tfoot>
            <tr id="total-row">
              <td></td>
              <td>total</td>
              <td id="total-amount"></td>
              <td></td>
              <td></td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </section>
    </main>

    <!-- 항목 상세 모달 -->
    <div
      id="detail-backdrop"
      class="backdrop hidden"
      role="dialog"
      aria-labelledby="detail-modal-title"
      aria-modal="true"
    >
      <div id="detail-modal" class="modal">
        <div class="modal-header">
          <h2 id="detail-modal-title">항목 상세</h2>
          <button type="button" class="modal-close" id="detail-close">×</button>
        </div>
        <div class="modal-body">
          <div class="modal-row">
            <span class="modal-label">제목:</span
            ><span id="detail-title"></span>
          </div>
          <div class="modal-row">
            <span class="modal-label">금액:</span
            ><span id="detail-amount"></span>
          </div>
          <div class="modal-row">
            <span class="modal-label">날짜:</span><span id="detail-date"></span>
          </div>
          <div class="modal-row">
            <span class="modal-label">카테고리:</span
            ><span id="detail-category"></span>
          </div>
          <div class="modal-row">
            <span class="modal-label">결제수단:</span
            ><span id="detail-payment"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- 내역 추가 모달 -->
    <div
      id="add-backdrop"
      class="backdrop hidden"
      role="dialog"
      aria-labelledby="add-modal-title"
      aria-modal="true"
    >
      <div id="add-modal" class="modal">
        <div class="modal-header">
          <h2 id="add-modal-title">내역 추가</h2>
          <button type="button" class="modal-close" id="add-close">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="add-title">제목</label>
            <input type="text" id="add-title" placeholder="제목을 입력하세요" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="add-type">유형</label>
              <select id="add-type">
                <option value="expense">지출 (-)</option>
                <option value="income">수입 (+)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="add-amount">금액 (숫자만)</label>
              <input
                type="number"
                id="add-amount"
                placeholder="금액을 입력하세요"
              />
            </div>
          </div>
          <div class="form-group">
            <label for="add-date">날짜</label>
            <input type="date" id="add-date" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="add-category">카테고리</label>
              <select id="add-category">
                <option value="">선택</option>
                <option value="월급">월급</option>
                <option value="식비">식비</option>
                <option value="생활">생활</option>
                <option value="문화">문화</option>
                <option value="교통">교통</option>
                <option value="기타">기타</option>
              </select>
            </div>
            <div class="form-group">
              <label for="add-payment">결제수단</label>
              <select id="add-payment">
                <option value="">선택</option>
                <option value="현금">현금</option>
                <option value="신용카드">신용카드</option>
                <option value="체크카드">체크카드</option>
                <option value="기타">기타</option>
              </select>
            </div>
          </div>
          <button type="button" id="btn-add-submit">추가</button>
        </div>
      </div>
    </div>
  </body>
</html>
